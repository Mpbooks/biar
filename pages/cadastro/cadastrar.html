    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class LightPillarEffect {
            constructor(containerId, options = {}) {
                this.container = document.getElementById(containerId);
                if (!this.container) return;

                this.config = {
                    topColor: options.topColor || '#5227FF',
                    bottomColor: options.bottomColor || '#FF9FFC',
                    intensity: options.intensity !== undefined ? options.intensity : 1.0,
                    rotationSpeed: options.rotationSpeed !== undefined ? options.rotationSpeed : 0.3,
                    interactive: options.interactive !== undefined ? options.interactive : true,
                    glowAmount: options.glowAmount !== undefined ? options.glowAmount : 0.005,
                    pillarWidth: options.pillarWidth !== undefined ? options.pillarWidth : 3.0,
                    pillarHeight: options.pillarHeight !== undefined ? options.pillarHeight : 0.4,
                    noiseIntensity: options.noiseIntensity !== undefined ? options.noiseIntensity : 0.5,
                    pillarRotation: options.pillarRotation !== undefined ? options.pillarRotation : 0,
                    quality: options.quality || 'high'
                };

                this.time = 0;
                this.mouse = new THREE.Vector2(0, 0);
                this.lastTime = performance.now();
                this.raf = null;

                this.init();
            }

            init() {
                const width = this.container.clientWidth;
                const height = this.container.clientHeight;

                this.scene = new THREE.Scene();
                this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const isLowEndDevice = isMobile || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4);

                let effectiveQuality = this.config.quality;
                if (isLowEndDevice && this.config.quality === 'high') effectiveQuality = 'medium';
                if (isMobile && this.config.quality !== 'low') effectiveQuality = 'low';

                const qualitySettings = {
                    low: { iterations: 24, waveIterations: 1, pixelRatio: 0.5, precision: 'mediump', stepMultiplier: 1.5 },
                    medium: { iterations: 40, waveIterations: 2, pixelRatio: 0.65, precision: 'mediump', stepMultiplier: 1.2 },
                    high: {
                        iterations: 80,
                        waveIterations: 4,
                        pixelRatio: Math.min(window.devicePixelRatio, 2),
                        precision: 'highp',
                        stepMultiplier: 1.0
                    }
                };

                const settings = qualitySettings[effectiveQuality] || qualitySettings.medium;

                try {
                    this.renderer = new THREE.WebGLRenderer({
                        antialias: false,
                        alpha: true,
                        powerPreference: effectiveQuality === 'high' ? 'high-performance' : 'low-power',
                        precision: settings.precision,
                        stencil: false,
                        depth: false
                    });
                } catch (error) {
                    console.error('WebGL not supported');
                    return;
                }

                this.renderer.setSize(width, height);
                this.renderer.setPixelRatio(settings.pixelRatio);
                this.container.appendChild(this.renderer.domElement);

                const parseColor = hex => {
                    const color = new THREE.Color(hex);
                    return new THREE.Vector3(color.r, color.g, color.b);
                };

                const vertexShader = `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 1.0);
                    }
                `;

                const fragmentShader = `
                    precision ${settings.precision} float;

                    uniform float uTime;
                    uniform vec2 uResolution;
                    uniform vec2 uMouse;
                    uniform vec3 uTopColor;
                    uniform vec3 uBottomColor;
                    uniform float uIntensity;
                    uniform bool uInteractive;
                    uniform float uGlowAmount;
                    uniform float uPillarWidth;
                    uniform float uPillarHeight;
                    uniform float uNoiseIntensity;
                    uniform float uRotCos;
                    uniform float uRotSin;
                    uniform float uPillarRotCos;
                    uniform float uPillarRotSin;
                    uniform float uWaveSin;
                    uniform float uWaveCos;
                    varying vec2 vUv;

                    const float STEP_MULT = ${settings.stepMultiplier.toFixed(1)};
                    const int MAX_ITER = ${settings.iterations};
                    const int WAVE_ITER = ${settings.waveIterations};

                    void main() {
                        vec2 uv = (vUv * 2.0 - 1.0) * vec2(uResolution.x / uResolution.y, 1.0);
                        uv = vec2(uPillarRotCos * uv.x - uPillarRotSin * uv.y, uPillarRotSin * uv.x + uPillarRotCos * uv.y);

                        vec3 ro = vec3(0.0, 0.0, -10.0);
                        vec3 rd = normalize(vec3(uv, 1.0));

                        float rotC = uRotCos;
                        float rotS = uRotSin;
                        if(uInteractive && (uMouse.x != 0.0 || uMouse.y != 0.0)) {
                            float a = uMouse.x * 6.283185;
                            rotC = cos(a);
                            rotS = sin(a);
                        }

                        vec3 col = vec3(0.0);
                        float t = 0.1;

                        for(int i = 0; i < MAX_ITER; i++) {
                            vec3 p = ro + rd * t;
                            p.xz = vec2(rotC * p.x - rotS * p.z, rotS * p.x + rotC * p.z);

                            vec3 q = p;
                            q.y = p.y * uPillarHeight + uTime;

                            float freq = 1.0;
                            float amp = 1.0;
                            for(int j = 0; j < WAVE_ITER; j++) {
                                q.xz = vec2(uWaveCos * q.x - uWaveSin * q.z, uWaveSin * q.x + uWaveCos * q.z);
                                q += cos(q.zxy * freq - uTime * float(j) * 2.0) * amp;
                                freq *= 2.0;
                                amp *= 0.5;
                            }

                            float d = length(cos(q.xz)) - 0.2;
                            float bound = length(p.xz) - uPillarWidth;
                            float k = 4.0;
                            float h = max(k - abs(d - bound), 0.0);
                            d = max(d, bound) + h * h * 0.0625 / k;
                            d = abs(d) * 0.15 + 0.01;

                            float grad = clamp((15.0 - p.y) / 30.0, 0.0, 1.0);
                            col += mix(uBottomColor, uTopColor, grad) / d;

                            t += d * STEP_MULT;
                            if(t > 50.0) break;
                        }

                        float widthNorm = uPillarWidth / 3.0;
                        col = tanh(col * uGlowAmount / widthNorm);

                        col -= fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) / 15.0 * uNoiseIntensity;

                        gl_FragColor = vec4(col * uIntensity, 1.0);
                    }
                `;

                const pillarRotRad = (this.config.pillarRotation * Math.PI) / 180;
                const waveSin = Math.sin(0.4);
                const waveCos = Math.cos(0.4);

                this.material = new THREE.ShaderMaterial({
                    vertexShader,
                    fragmentShader,
                    uniforms: {
                        uTime: { value: 0 },
                        uResolution: { value: new THREE.Vector2(width, height) },
                        uMouse: { value: this.mouse },
                        uTopColor: { value: parseColor(this.config.topColor) },
                        uBottomColor: { value: parseColor(this.config.bottomColor) },
                        uIntensity: { value: this.config.intensity },
                        uInteractive: { value: this.config.interactive },
                        uGlowAmount: { value: this.config.glowAmount },
                        uPillarWidth: { value: this.config.pillarWidth },
                        uPillarHeight: { value: this.config.pillarHeight },
                        uNoiseIntensity: { value: this.config.noiseIntensity },
                        uRotCos: { value: 1.0 },
                        uRotSin: { value: 0.0 },
                        uPillarRotCos: { value: Math.cos(pillarRotRad) },
                        uPillarRotSin: { value: Math.sin(pillarRotRad) },
                        uWaveSin: { value: waveSin },
                        uWaveCos: { value: waveCos }
                    },
                    transparent: true,
                    depthWrite: false,
                    depthTest: false
                });

                const geometry = new THREE.PlaneGeometry(2, 2);
                const mesh = new THREE.Mesh(geometry, this.material);
                this.scene.add(mesh);

                this.setupEventListeners();
                this.animate();
            }

            setupEventListeners() {
                if (this.config.interactive) {
                    window.addEventListener('mousemove', (event) => {
                        const rect = this.container.getBoundingClientRect();
                        const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                        const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                        this.mouse.set(x, y);
                    }, { passive: true });
                }

                window.addEventListener('resize', () => {
                    const newWidth = this.container.clientWidth;
                    const newHeight = this.container.clientHeight;
                    this.renderer.setSize(newWidth, newHeight);
                    this.material.uniforms.uResolution.value.set(newWidth, newHeight);
                }, { passive: true });
            }

            animate(currentTime = performance.now()) {
                this.raf = requestAnimationFrame((time) => this.animate(time));

                const deltaTime = currentTime - this.lastTime;
                const targetFPS = this.config.quality === 'low' ? 30 : 60;
                const frameTime = 1000 / targetFPS;

                if (deltaTime >= frameTime) {
                    this.time += 0.016 * this.config.rotationSpeed;
                    this.material.uniforms.uTime.value = this.time;
                    this.material.uniforms.uRotCos.value = Math.cos(this.time * 0.3);
                    this.material.uniforms.uRotSin.value = Math.sin(this.time * 0.3);
                    this.renderer.render(this.scene, this.camera);
                    this.lastTime = currentTime - (deltaTime % frameTime);
                }
            }

            updateConfig(newConfig) {
                Object.assign(this.config, newConfig);
                if (newConfig.topColor) {
                    this.material.uniforms.uTopColor.value = new THREE.Color(newConfig.topColor);
                }
                if (newConfig.bottomColor) {
                    this.material.uniforms.uBottomColor.value = new THREE.Color(newConfig.bottomColor);
                }
                // Update other uniforms as needed...
            }
        }

        // Initialize the effect
        window.addEventListener('DOMContentLoaded', () => {
            const effect = new LightPillarEffect('light-pillar', {
                topColor: '#5227FF',
                bottomColor: '#FF9FFC',
                intensity: 0.8,
                rotationSpeed: 0.4,
                interactive: false,
                pillarRotation: 45,
                pillarWidth: 3.1,
                pillarHeight: 0.45
            });
        });
    </script>
